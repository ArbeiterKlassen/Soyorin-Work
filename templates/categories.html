  <!-- 初始主题检测 + 全局变量 (需在页面内容前定义) -->
  <script>
    var mode = 1;
    (function() {
      var saved = localStorage.getItem('soyorin-mode');
      if (saved) mode = parseInt(saved);
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = saved ? saved === '2' : prefersDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
    function getParams(key) {
      var reg = new RegExp("(^|&)" + key + "=([^&]*)(&|$)");
      var r = window.location.search.substr(1).match(reg);
      if (r != null) return decodeURIComponent(r[2]);
      return null;
    }
    function hasadmission() {
      return localStorage.getItem('soyorin-admission') !== null;
    }
    function pagereload(colormode) {
      localStorage.setItem('soyorin-mode', colormode);
      document.documentElement.setAttribute('data-theme', colormode === 2 ? 'dark' : 'light');
    }
  </script>

  <script>
    (function(){
      var btn = document.getElementById('mobile_cate');
      var menu = document.getElementById('nav-m-list');
      var cancel = document.getElementById('cancel');

      btn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        menu.classList.add('nav-open');
      });

      cancel.addEventListener('click', function(e){
        e.preventDefault();
        menu.classList.remove('nav-open');
      });

      menu.addEventListener('click', function(e){
        e.stopPropagation();
      });

      document.addEventListener('click', function(){
        menu.classList.remove('nav-open');
      });
    })();
